# ============================================================
#  ApartmentCore - Main Menu GUI Configuration
# ============================================================
#  This file controls the appearance and layout of the
#  Main Menu GUI (/apartmentcore menu).
#
#  All values here override the built-in defaults.
#  Remove or comment out any key to fall back to the
#  hardcoded default for that specific property.
#
#  Color codes: use '&' followed by a color code (e.g. &6 = gold)
#  Placeholders (resolved at runtime):
#    {owned_count}          - Number of apartments the player owns
#    {max_apartments}       - Maximum apartments allowed per player
#    {pending_income}       - Total pending income (formatted)
#    {available_count}      - Number of available apartments
#    {cheapest_price}       - Cheapest apartment price (formatted)
#    {total_unpaid}         - Total unpaid taxes (formatted)
#    {overdue_count}        - Number of overdue apartments
#    {tax_status_color}     - Dynamic color based on tax status (&a or &c)
#    {tax_status}           - Tax status text ("All Paid" or "Taxes Due!")
#    {active_auctions}      - Number of active auctions
#    {auction_commission}   - Auction commission percentage
#    {research_completed}   - Completed research tiers
#    {research_max}         - Maximum research tiers
#    {research_status}      - Current research status line
#    {achievement_completed}- Completed achievements count
#    {achievement_total}    - Total achievements count
#    {achievement_percent}  - Achievement completion percentage
#    {achievement_bar}      - Achievement progress bar
#    {lifetime_income}      - Total lifetime income (formatted)
#    {total_tax_paid}       - Total tax paid (formatted)
#    {outstanding_taxes}    - Outstanding taxes (formatted)
#    {player_name}          - Player display name
#    {plugin_version}       - Plugin version string
#    {economy_name}         - Economy provider name
#    {player_balance}       - Player balance (formatted)
# ============================================================

# GUI title (supports color codes)
gui_title: "&f<shift:-8>ꑨ"

# GUI size in slots (must be a multiple of 9: 9, 18, 27, 36, 45, 54)
gui_size: 45

# ============================================================
#  Menu Items
# ============================================================
#  Each item supports:
#    enabled           - Whether the item is enabled (true/false, default: true)
#    slot              - Inventory slot position (e.g. 0, or "0, 1, 2" for multiple)
#    material          - Bukkit Material name
#    custom_model_data - Custom model data (integer, optional)
#    name              - Display name (supports color codes & placeholders)
#    lore              - List of lore lines (supports color codes & placeholders)
#    glow              - Whether to add enchantment glow (true/false)
#    commands          - List of commands to execute when clicked (for custom items).
#                        Prefix with [console] , [player] , [message] , or [close].
# ============================================================

# Example of a custom item (uncomment to use):
#  custom_discord_link:
#    enabled: true
#    slot: 53
#    material: PLAYER_HEAD
#    name: "&9\uD83D\uDCAC Join our Discord!"
#    lore:
#      - "&7Click to get the discord link"
#    commands:
#      - "[message] &aJoin here: https://discord.gg/example"
#      - "[close]"

items:
# Player info head (shown at top center)
  player_info:
    enabled: true
    slot: 21
    material: GOLD_NUGGET
    custom_model_data: 7000
    name: "&6{player_name}"
    lore:
      - "&7ApartmentCore v{plugin_version}"
      - "&7Economy: &f{economy_name}"
      - ""
      - "&7Balance: &a{player_balance}"
  my_apartments:
    slot: "0, 1, 2, 9, 10, 11, 18, 19, 20"
    material: GOLD_NUGGET
    custom_model_data: 7000
    name: "&6My Apartments"
    lore:
      - "&7Manage your owned apartments"
      - ""
      - "&e\uD83D\uDCCA Statistics:"
      - "&7\u2022 Owned: &f{owned_count}&7/&f{max_apartments}"
      - "&7\u2022 Pending Income: &a{pending_income}"
      - ""
      - "&a\u25B6 Click to open"
    glow: false

  browse_buy:
    slot: "27, 28, 29, 30"
    material: GOLD_NUGGET
    custom_model_data: 7000
    name: "&6\uD83D\uDED2 Browse & Buy"
    lore:
      - "&7Browse available apartments"
      - ""
      - "&e\uD83D\uDCCA Market Info:"
      - "&7\u2022 Available: &f{available_count} &7apartments"
      - "&7\u2022 Starting from: &a{cheapest_price}"
      - ""
      - "&a\u25B6 Click to browse"
    glow: true

  tax_management:
    slot: "4, 5, 6, 7, 8"
    material: GOLD_NUGGET
    custom_model_data: 7000
    name: "&6 Invoice Center"
    lore:
      - "&7Manage your tax payments"
      - ""
      - "&e\uD83D\uDCCA Tax Status:"
      - "&7\u2022 Status: {tax_status_color}{tax_status}"
      - "&7\u2022 Total Due: &f{total_unpaid}"
      - "&7\u2022 Overdue: &f{overdue_count} &7apartments"
      - ""
